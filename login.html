<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VisionPro — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root[data-theme="dark"]{
  --bg:#0a0c12;
  --bg2:#10131f;
  --card:rgba(16,19,31,0.95);
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.15);
  --text:#eceef5;
  --sub:#7a7f9a;
  --accent:#4f8ef7;
  --accent-glow:rgba(79,142,247,0.25);
  --input-bg:rgba(255,255,255,0.05);
  --input-border:rgba(255,255,255,0.1);
  --input-focus:rgba(79,142,247,0.4);
  --btn:#4f8ef7;
  --btn-text:#fff;
  --shadow:0 32px 80px rgba(0,0,0,0.6);
  --orb1:rgba(79,142,247,0.12);
  --orb2:rgba(147,79,247,0.08);
}
:root[data-theme="light"]{
  --bg:#f0f2f8;
  --bg2:#e6e9f4;
  --card:rgba(255,255,255,0.92);
  --border:rgba(0,0,0,0.06);
  --border2:rgba(0,0,0,0.12);
  --text:#1a1d2e;
  --sub:#6b7090;
  --accent:#2563eb;
  --accent-glow:rgba(37,99,235,0.15);
  --input-bg:rgba(0,0,0,0.03);
  --input-border:rgba(0,0,0,0.1);
  --input-focus:rgba(37,99,235,0.25);
  --btn:#2563eb;
  --btn-text:#fff;
  --shadow:0 32px 80px rgba(0,0,0,0.12);
  --orb1:rgba(37,99,235,0.08);
  --orb2:rgba(99,37,235,0.06);
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  transition:background .4s,color .4s;overflow:hidden;
}

/* Background orbs */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb1{width:600px;height:600px;background:var(--orb1);top:-200px;right:-100px}
.orb2{width:500px;height:500px;background:var(--orb2);bottom:-150px;left:-100px}

/* Grid background */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(79,142,247,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(79,142,247,0.03) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
}

/* Theme toggle */
.theme-toggle{
  position:fixed;top:24px;right:24px;z-index:100;
  width:48px;height:48px;border-radius:50%;
  background:var(--card);border:1px solid var(--border2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:20px;transition:all .3s;box-shadow:var(--shadow);
}
.theme-toggle:hover{transform:rotate(20deg) scale(1.1)}

/* Card */
.card{
  position:relative;z-index:10;
  width:100%;max-width:440px;margin:20px;
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:24px;
  padding:48px 44px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(24px);
  animation:cardIn .6s cubic-bezier(.16,1,.3,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(32px) scale(0.96)}
  to{opacity:1;transform:none}
}

/* Logo */
.logo{text-align:center;margin-bottom:36px}
.logo-icon{
  width:64px;height:64px;border-radius:18px;margin:0 auto 16px;
  background:linear-gradient(135deg,var(--accent),#7c4eff);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;box-shadow:0 12px 32px var(--accent-glow);
}
.logo-name{
  font-family:'Playfair Display',serif;
  font-size:28px;font-weight:700;letter-spacing:-0.02em;
}
.logo-sub{font-size:13px;color:var(--sub);margin-top:4px;font-weight:300}

/* Fields */
.field{margin-bottom:18px}
.field label{
  display:block;font-size:12px;font-weight:600;
  letter-spacing:0.06em;text-transform:uppercase;
  color:var(--sub);margin-bottom:8px;
}
.field input{
  width:100%;padding:13px 16px;
  background:var(--input-bg);
  border:1px solid var(--input-border);
  border-radius:12px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:14px;
  transition:all .25s;outline:none;
}
.field input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--input-focus);
  background:var(--input-bg);
}
.field input::placeholder{color:var(--sub);opacity:0.6}

/* Error */
.error-msg{
  background:rgba(255,77,77,0.1);border:1px solid rgba(255,77,77,0.25);
  color:#ff6b6b;border-radius:10px;padding:11px 14px;
  font-size:13px;margin-bottom:16px;display:none;
  animation:shake .3s ease;
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* Submit */
.btn-submit{
  width:100%;padding:14px;border-radius:12px;
  background:var(--btn);color:var(--btn-text);
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;
  border:none;cursor:pointer;transition:all .25s;
  letter-spacing:0.01em;margin-top:8px;
  box-shadow:0 8px 24px var(--accent-glow);
}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 12px 32px var(--accent-glow)}
.btn-submit:active{transform:translateY(0)}
.btn-submit.loading{opacity:0.7;cursor:not-allowed}

/* Demo accounts */
.demo-section{
  margin-top:28px;padding-top:24px;
  border-top:1px solid var(--border);
}
.demo-title{font-size:11px;font-weight:600;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--sub);text-align:center;margin-bottom:14px}
.demo-accounts{display:flex;flex-direction:column;gap:8px}
.demo-btn{
  width:100%;padding:10px 14px;border-radius:10px;
  background:var(--input-bg);border:1px solid var(--border);
  color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:all .2s;text-align:left;
  display:flex;align-items:center;justify-content:space-between;
}
.demo-btn:hover{border-color:var(--accent);background:var(--accent-glow)}
.demo-badge{
  font-size:10px;padding:2px 8px;border-radius:4px;
  background:rgba(79,142,247,0.15);color:var(--accent);font-weight:600;
}

/* Divider */
.divider{
  display:flex;align-items:center;gap:12px;margin:24px 0;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}
.divider span{font-size:11px;color:var(--sub);font-weight:500}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</button>

<div class="card">
  <div class="logo">
    <div class="logo-icon">👁️</div>
    <div class="logo-name">VisionPro</div>
    <div class="logo-sub">AI-Powered Real-time Detection</div>
  </div>

  <div class="error-msg" id="errMsg"></div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')doLogin()"/>
  </div>

  <button class="btn-submit" id="loginBtn" onclick="doLogin()">Sign In to VisionPro</button>

  <div class="demo-section">
    <div class="demo-title">Quick Access — Demo Accounts</div>
    <div class="demo-accounts">
      <button class="demo-btn" onclick="fill('admin','admin123')">
        <span>👑 admin</span><span class="demo-badge">Full Access</span>
      </button>
      <button class="demo-btn" onclick="fill('demo','demo123')">
        <span>👤 demo</span><span class="demo-badge">Demo</span>
      </button>
      <button class="demo-btn" onclick="fill('user','password')">
        <span>🔵 user</span><span class="demo-badge">Basic</span>
      </button>
    </div>
  </div>
</div>

<script>
// Theme
const saved = localStorage.getItem('vp_theme') || 'dark';
document.documentElement.setAttribute('data-theme', saved);
document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️' : '🌙';

function toggleTheme(){
  const curr = document.documentElement.getAttribute('data-theme');
  const next = curr === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('vp_theme', next);
}

function fill(u, p){
  document.getElementById('username').value = u;
  document.getElementById('password').value = p;
  document.getElementById('username').focus();
}

async function doLogin(){
  const btn  = document.getElementById('loginBtn');
  const err  = document.getElementById('errMsg');
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;

  if(!user || !pass){
    showError('Please enter username and password');
    return;
  }
  btn.textContent = 'Signing in...';
  btn.classList.add('loading');
  err.style.display = 'none';

  try{
    const r = await fetch('/api/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:user, password:pass})
    });
    const d = await r.json();
    if(d.success){
      btn.textContent = '✓ Welcome!';
      setTimeout(()=>{ window.location.href = '/'; }, 500);
    } else {
      showError(d.error || 'Invalid credentials');
      btn.textContent = 'Sign In to VisionPro';
      btn.classList.remove('loading');
    }
  } catch(e){
    showError('Connection error. Is the server running?');
    btn.textContent = 'Sign In to VisionPro';
    btn.classList.remove('loading');
  }
}

function showError(msg){
  const e = document.getElementById('errMsg');
  e.textContent = msg;
  e.style.display = 'block';
  e.style.animation = 'none';
  e.offsetHeight;
  e.style.animation = 'shake .3s ease';
}
</script>
</body>
</html>
